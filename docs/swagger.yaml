  description: TDO REST-API schema
  version: "1.0"
paths:
  /jobs:
    get:
      consumes:
      - application/json
      description: Returns a job by id.
      parameters:
      - description: Get job request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_jobs_transport.GetJobDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_jobs_transport.GetJobRespDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
      summary: Get job
      tags:
      - jobs
    post:
      consumes:
      - application/json
      description: Creates a new distributed cron job. For type "http", provide http_method
        and http_url. For type "db", provide db_action and target_db.
      parameters:
      - description: Create job request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_jobs_transport.CreateJobReqDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_features_jobs_transport.CreateJobRespDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
      summary: Create job
      tags:
      - jobs
  /jobs/cencel:
    patch:
      consumes:
      - application/json
      description: Cancels an existing job by id and returns the updated job.
      parameters:
      - description: Cancel job request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_jobs_transport.ChangeJob'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_jobs_transport.ChangeJobRespDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
      summary: Cancel job
      tags:
      - jobs
  /jobs/rerun:
    patch:
      consumes:
      - application/json
      description: Schedules an existing job for rerun by id and returns the updated
        job.
      parameters:
      - description: Rerun job request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_features_jobs_transport.ChangeJob'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_features_jobs_transport.ChangeJobRespDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_DimaKirejko_Dstributed_cron_internal_core_response.ErrorResponse'
      summary: Rerun job
      tags:
      - jobs
